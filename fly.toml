app = "gestion-patrimoine"
primary_region = "jnb"

[build]
  builder = "paketobuildpacks/builder:base"

[env]
  PORT = "8000"
  DEBUG = "False"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

[deploy]
  release_command = "python manage.py migrate --no-input"