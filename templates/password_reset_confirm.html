<!DOCTYPE html>
<html lang="en" data-theme="synthwave">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Confirmer la réinitialisation du mot de passe">
    <title>Réinitialiser le mot de passe</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <style>
        @media (max-width: 768px) {
            .flex.h-200 {
                min-height: 100vh;
                padding: 1.5rem;
            }
            .w-lg {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="flex h-200 justify-center items-center px-4 min-h-screen">
    <div class="w-full max-w-md">

        {% if error %}
            <div class="alert alert-error mb-4">
                {{ error }}
            </div>
        {% endif %}

        <form class="fieldset bg-base-200 border-base-300 rounded-box h-auto shadow-xl border p-10" method="post" action="">
            {% csrf_token %}
            <div class="text-2xl flex justify-center font-bold mb-6">Réinitialisation du mot de passe</div>

            <label class="fieldset text-lg">
            <span class="label">Nouveau mot de passe</span>
            <input type="password" class="input validator w-full" placeholder="Nouveau mot de passe" name="new_pw" required />
            <span class="validator-hint hidden">Required</span>
          </label>
          
          <button class="btn btn-neutral mt-8 w-full" type="submit">Réinitialiser</button>
        </form>
    </div>
</div>
</body>
</html>
