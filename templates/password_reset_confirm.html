<!DOCTYPE html>
<html lang="en" data-theme="synthwave">
<head>
    <meta charset="UTF-8">
    <title>Sign in</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
</head>
<body>

<div class="flex h-200 justify-center items-center">
    <div>

        {% if error %}
            <div class="alert alert-error mb-4">
                {{ error }}
            </div>
        {% endif %}

        <form class="fieldset bg-base-200 border-base-300  rounded-box w-lg h-auto shadow-xl border p-10" method="post" action="">
            {% csrf_token %}
            <div class="text-2xl flex justify-center font-bold mb-6">Réinitialisation du mot de passe</div>

            <label class="fieldset text-lg">
            <span class="label">Nouveau mot de passe</span>
            <input type="password" class="input validator w-full" placeholder="Nouveau mot de passe" name="new_pw" required />
            <span class="validator-hint hidden">Required</span>
          </label>
          
          <button class="btn btn-neutral mt-8" type="submit">Réinitialiser</button>
           {% comment %} <a href="{% url 'home' %}" class="btn btn-link mt-4">Retour à la page de connexion</a>                     {% endcomment %}
        </form>
    </div>
</div>
</body>
</html>
