<!DOCTYPE html>
<html lang="en" data-theme="synthwave">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Inscription à Gestion Patrimoine">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <title>S'inscrire - Gestion Patrimoine</title>
    <style>
        @media (max-width: 768px) {
            .flex.h-200 {
                min-height: 100vh;
                padding: 1.5rem;
            }
            .w-lg {
                max-width: 100%;
            }
        }
        @media (max-width: 480px) {
            .flex.h-20 {
                height: auto;
                padding: 1rem 0.5rem;
            }
            .fieldset {
                padding: 1.5rem !important;
            }
        }
    </style>
</head>
<body>
    <div class="flex h-20 ml-10 justify-left items-center md:h-20">
      <a href="{% url 'home'%}" class="btn btn-ghost text-2xl hover:text-blue-100 font-bold btn-sm">← Acceuil</a>
    </div>
    <div class="flex h-200 justify-center items-center px-4">
        <div>
            {% if error %}
                <div class="alert alert-error w-full md:w-md mb-4">
                    {{ error }}
                </div>
            {% endif %}

            <form class="fieldset bg-base-200 border-base-300 rounded-box w-full md:w-lg border p-10" method="post">
                {% csrf_token %}
                <div class="text-2xl flex justify-center font-bold mb-6">S'inscrire</div>
               <label class="fieldset mb-4 text-lg">
                <span class="label">Nom d'utilisateur</span>
                <input type="text" class="input validator w-full" placeholder="Nom d'utilisateur" name="username" required />
                <span class="validator-hint hidden">Required</span>
              </label>

                <label class="fieldset mb-4 text-lg">
                <span class="label">Email</span>
                <input type="email" class="input validator w-full" placeholder="Votre Email" name="email" required />
                <span class="validator-hint hidden">Required</span>
              </label>

              <label class="fieldset mb-4 text-lg">
                <span class="label">Mot de passe</span>
                <input type="password" class="input validator w-full" placeholder="Mot de passe" name="pw" required />
                <span class="validator-hint hidden">Required</span>
              </label>

                <label class="fieldset mb-4 text-lg">
                <span class="label">Confirmer le mot de passe</span>
                <input type="password" class="input validator w-full" placeholder="Confirmer le mot de passe" name="re-pw" required />
                <span class="validator-hint hidden">Required</span>
              </label>

              <button class="btn btn-neutral mt-3 w-full" type="submit">S'inscrire</button>
              <button class="btn btn-active mt-1 w-full" type="reset">Effacer</button>

                {% load socialaccount %}

                <div style="text-align:center; margin:15px 0;">
                    <span>── ou ──</span>
                </div>

                <a href="{% provider_login_url 'google' %}"
                   style="display:flex; align-items:center; justify-content:center; gap:10px;
                          padding:10px 20px; border:1px solid #ddd; border-radius:8px;
                          text-decoration:none; color:#333; background:#fff; font-weight:500; width: 100%;">
                    <svg width="20" height="20" viewBox="0 0 48 48">
                        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                    </svg>
                    <span>S'inscrire avec Google</span>
                </a>

            </form>
        </div>
    </div>
</body>
</html>
